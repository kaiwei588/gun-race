<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gun & Race · 在线游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, #050510 70%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap { max-width: 920px; width: 100%; text-align: center; }
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #5dffe8, #ffd27a, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: rgba(255,255,255,0.55);
      margin-bottom: 40px;
      font-size: 1rem;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px 24px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .card.shooter:hover { box-shadow: 0 12px 40px rgba(255,100,60,0.2); }
    .card.race:hover { box-shadow: 0 12px 40px rgba(93,255,232,0.2); }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    .card h2 { font-size: 1.4rem; margin-bottom: 10px; }
    .card p {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .card.shooter .btn {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
    }
    .card.race .btn {
      background: linear-gradient(135deg, #00cec9, #0984e3);
      color: #fff;
    }
    .tips {
      margin-top: 36px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      line-height: 1.8;
    }
    kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>GUN & RACE</h1>
    <p class="subtitle">浏览器即开即玩 · 无需下载</p>

    <div class="cards">
      <a class="card shooter" href="shooter.html">
        <div class="icon">🔫</div>
        <h2>火线突围</h2>
        <p>3D 第一人称枪战 · 队友协同 · Boss 战 · 太刀觉醒 · 无尽关卡</p>
        <span class="btn">开始战斗</span>
      </a>

      <a class="card race" href="race.html">
        <div class="icon">🏎️</div>
        <h2>霓虹狂飙 3D</h2>
        <p>3D 赛车竞速 · 霓虹赛道 · 漂移过弯 · 挑战最快圈速</p>
        <span class="btn">开始竞速</span>
      </a>
    </div>

    <p class="tips">
      推荐 Chrome / Edge · 点击进入游戏后锁定鼠标<br>
      枪战：<kbd>WASD</kbd> 移动 · 左键射击 · <kbd>2</kbd> 队友强化 ×2 · <kbd>E</kbd> 召回队友<br>
      赛车：<kbd>↑↓←→</kbd> 或 <kbd>WASD</kbd> 驾驶 · <kbd>Space</kbd> 漂移
    </p>
  </div>
</body>
</html>
